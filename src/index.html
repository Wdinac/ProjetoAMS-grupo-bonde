<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Caneta Azul - O Site Oficial (ou quase)</title>
    <style>
        body {
            background-color: #87CEFA;
            font-family: Comic Sans MS, cursive;
            text-align: center;
            color: #003366;
        }
        h1 {
            font-size: 50px;
        }
        .caneta {
            font-size: 100px;
        }
        button {
            padding: 15px;
            font-size: 18px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        button:hover {
            background-color: darkblue;
        }
        footer {
            margin-top: 50px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h1>🎤 Caneta Azul 🎤</h1>
    <p>O site mais azul do brasil</p>

    <div class="caneta">🖊️</div>

    <h2>Caneta azul, azul caneta...</h2>
    <p>Se você cantou isso automaticamente, parabéns: MORRA</p>

    <button onclick="cantar()">CLIQUE PARA SENTIR A EMOÇÃO</button>

    <p id="letra"></p>

    <img src="https://i.imgur.com/1Q9Z1Zm.png" alt="Caneta triste" width="200">

    <footer>
        <p>Site 100% não oficial feito na força da saudade da caneta 😔</p>
        <p>Se a caneta voltar, avisamos.</p>
    </footer>

    <script>
        function cantar() {
            document.getElementById("letra").innerHTML = 
            "Caneta azul, azul caneta 💙<br>Caneta azul tá marcada com minha letra 😭<br><br>AGORA VOCÊ NÃO CONSEGUE PARAR DE CANTAR.";
        }
    </script>

</body>
</html>
